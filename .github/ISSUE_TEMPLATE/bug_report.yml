name: Bug report
description: Report a reproducible problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Clear and short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Share exact commands, config, and steps.
      placeholder: |
        1. Run `composer ic:tests`
        2. ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead? Include full error output if possible.
    validations:
      required: true
  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "e.g. 8.3.8"
    validations:
      required: true
  - type: input
    id: composer_version
    attributes:
      label: Composer version
      placeholder: "e.g. 2.9.2"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment details
      description: OS, CI provider, shell, and anything else relevant.
      placeholder: Ubuntu 24.04, GitHub Actions, bash...
    validations:
      required: true
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Links, screenshots, logs, or related issues.
